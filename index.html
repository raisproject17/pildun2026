<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE PIALA DUNIA 2026 by raistech</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS.js untuk memutar format .m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Kustomisasi scrollbar untuk daftar channel */
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        .channel-list::-webkit-scrollbar-thumb {
            background: #3b82f6; 
            border-radius: 10px;
        }
        .channel-list::-webkit-scrollbar-thumb:hover {
            background: #2563eb; 
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-slate-950 border-b border-slate-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-trophy text-yellow-400 text-2xl"></i>
                <h1 class="text-xl md:text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-green-400">
                    LIVE PIALA DUNIA 2026
                </h1>
            </div>
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-400">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                LIVE STREAMING
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-4">
        
        <!-- Video Player Section -->
        <div class="lg:w-3/4 flex flex-col gap-4">
            <div class="bg-black rounded-xl overflow-hidden shadow-2xl relative aspect-video border border-slate-800">
                <video id="video-player" class="w-full h-full object-contain" controls autoplay></video>
                <!-- Loading Indicator Overlay -->
                <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-10 hidden">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-3"></i>
                    <p class="text-slate-300 font-medium">Memuat Stream...</p>
                </div>
            </div>
            
            <div class="bg-slate-800 rounded-xl p-4 shadow-lg border border-slate-700">
                <h2 id="current-channel-name" class="text-xl font-bold text-blue-400 mb-1">Pilih Server</h2>
                <p id="current-channel-status" class="text-sm text-slate-400">Silakan pilih server pertandingan dari daftar di samping/bawah.</p>
            </div>
        </div>

        <!-- Channel List Section -->
        <div class="lg:w-1/4 flex flex-col bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-lg h-[500px] lg:h-auto">
            <div class="p-4 bg-slate-850 border-b border-slate-700 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-list text-blue-400 mr-2"></i>Daftar Server</h3>
                <span class="bg-blue-600/20 text-blue-400 text-xs px-2 py-1 rounded border border-blue-500/30">IPTV</span>
            </div>
            
            <div id="channel-container" class="channel-list p-2 overflow-y-auto flex-grow flex flex-col gap-2">
                <!-- Channel buttons will be generated here by JavaScript -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 border-t border-slate-800 p-6 mt-8">
        <div class="container mx-auto text-center">
            <p class="text-slate-400 text-sm">
                &copy; 2026 Siaran Langsung Sepak Bola
            </p>
            <p class="text-slate-500 text-xs mt-2 font-mono">
                powered by <span class="text-blue-400 font-bold tracking-wide">raistech.</span>
            </p>
        </div>
    </footer>

    <!-- Player Logic Script -->
    <script>
        // === KONFIGURASI DAFTAR CHANNEL IPTV (.m3u8) ===
        // Ganti URL m3u8 di bawah ini dengan link IPTV Piala Dunia Anda yang aktif.
        // Saat ini menggunakan link m3u8 dummy/test stream publik sebagai contoh.
        const channels = [
            {
                id: 1,
                name: "Server 1 (Main FHD)",
                url: "https://ott-balancer.tvri.go.id/live/eds/SportHD/hls/SportHD.m3u8",
                icon: "fa-tv"
            },
            {
                id: 2,
                name: "Server 2 (Cadangan HD)",
                url: "https://ott-balancer.tvri.go.id/live/eds/Nasional/hls/Nasional.m3u8",
                icon: "fa-satellite-dish"
            },
            {
                id: 3,
                name: "Server 3 (Kamera Taktik)",
                url: "https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8",
                icon: "fa-video"
            },
            {
                id: 4,
                name: "Server 4 (Low Data)",
                url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", // Ganti dengan link 480p
                icon: "fa-mobile-screen"
            }
        ];

        const videoElement = document.getElementById('video-player');
        const channelContainer = document.getElementById('channel-container');
        const currentChannelName = document.getElementById('current-channel-name');
        const currentChannelStatus = document.getElementById('current-channel-status');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        let hlsPlayer = null;
        let activeChannelId = null;

        // Render daftar channel ke sidebar
        function renderChannels() {
            channelContainer.innerHTML = '';
            channels.forEach(channel => {
                const button = document.createElement('button');
                button.className = `w-full text-left p-3 rounded-lg flex items-center gap-3 transition-all duration-200 border ${activeChannelId === channel.id ? 'bg-blue-600 border-blue-500 text-white shadow-[0_0_15px_rgba(37,99,235,0.3)]' : 'bg-slate-700/50 border-transparent text-slate-300 hover:bg-slate-700 hover:text-white'}`;
                
                button.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-slate-900 flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid ${channel.icon} ${activeChannelId === channel.id ? 'text-blue-400' : 'text-slate-400'}"></i>
                    </div>
                    <div class="flex-grow font-medium truncate">
                        ${channel.name}
                    </div>
                    ${activeChannelId === channel.id ? '<div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>' : ''}
                `;
                
                button.onclick = () => playStream(channel);
                channelContainer.appendChild(button);
            });
        }

        // Fungsi untuk memutar stream
        function playStream(channel) {
            activeChannelId = channel.id;
            renderChannels(); // Update status tombol (aktif/tidak)
            
            // Update UI teks
            currentChannelName.innerHTML = `<span class="text-red-500 mr-2">● LIVE</span> ${channel.name}`;
            currentChannelStatus.innerText = "Menghubungkan ke server stream...";
            loadingOverlay.classList.remove('hidden');

            // Hancurkan instance HLS sebelumnya jika ada
            if (hlsPlayer) {
                hlsPlayer.destroy();
            }

            // Cek dukungan HLS
            if (Hls.isSupported()) {
                hlsPlayer = new Hls({
                    maxBufferLength: 30, // optimasi buffer untuk live
                    liveSyncDurationCount: 3,
                });
                
                hlsPlayer.loadSource(channel.url);
                hlsPlayer.attachMedia(videoElement);
                
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function () {
                    loadingOverlay.classList.add('hidden');
                    currentChannelStatus.innerHTML = "Berhasil terhubung. Menyiarkan <b>" + channel.name + "</b>.";
                    videoElement.play().catch(e => console.log("Autoplay dicegah browser, harus klik play manually."));
                });

                hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        loadingOverlay.classList.add('hidden');
                        currentChannelStatus.innerHTML = `<span class="text-red-400"><i class="fa-solid fa-triangle-exclamation"></i> Gagal memuat stream. Server mungkin sedang offline atau diblokir.</span>`;
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hlsPlayer.startLoad(); // Coba muat ulang
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsPlayer.recoverMediaError();
                                break;
                            default:
                                hlsPlayer.destroy();
                                break;
                        }
                    }
                });

            } 
            // Fallback untuk browser Safari / iOS (Native HLS support)
            else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = channel.url;
                videoElement.addEventListener('loadedmetadata', function () {
                    loadingOverlay.classList.add('hidden');
                    currentChannelStatus.innerHTML = "Berhasil terhubung. Menyiarkan <b>" + channel.name + "</b>.";
                    videoElement.play();
                });
                videoElement.addEventListener('error', function() {
                    loadingOverlay.classList.add('hidden');
                    currentChannelStatus.innerHTML = `<span class="text-red-400">Gagal memuat stream di perangkat ini.</span>`;
                });
            } else {
                loadingOverlay.classList.add('hidden');
                currentChannelStatus.innerHTML = `<span class="text-yellow-400">Browser Anda tidak mendukung pemutaran video format ini.</span>`;
            }
        }

        // Inisialisasi awal (Render list tanpa autoplay)
        renderChannels();
        
        // Opsional: otomatis putar server 1 saat halaman dimuat (hilangkan komen jika ingin auto-play)
        // playStream(channels[0]);

    </script>
</body>
</html>
